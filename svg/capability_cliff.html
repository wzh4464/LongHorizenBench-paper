<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fig 3 — Capability Cliff</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&display=block" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: "Source Serif 4", Georgia, serif; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <script>
    const W = 460, H = 310;
    const margin = { top: 16, right: 24, bottom: 46, left: 52 };
    const pw = W - margin.left - margin.right;
    const ph = H - margin.top - margin.bottom;

    // Morandi palette
    const COLORS = {
      other: "#A3A08E",   // warm sage gray
      kube:  "#B87D7B",   // dusty rose
      t10:   "#7B9CB5",   // muted steel blue
      threshold: "#8C8C8C",
      grid: "#E5E3DE",
      axis: "#4A4A48",
      frame: "#4A4A48",
      legendBg: "rgba(255,255,253,0.92)"
    };

    const svg = d3.select("#chart").append("svg")
      .attr("width", W).attr("height", H)
      .attr("data-figure", "capability-cliff");

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    d3.json("capability_cliff_data.json").then(data => {
      // Scales
      const x = d3.scaleLog().domain([0.7, 1500]).range([0, pw]);
      const y = d3.scaleLinear().domain([0, 12]).range([ph, 0]);

      // Grid lines
      const xTicks = [1, 10, 100, 1000];
      const yTicks = [0, 2, 4, 6, 8, 10, 12];

      g.selectAll(".grid-x").data(xTicks).enter().append("line")
        .attr("data-grid", "x")
        .attr("x1", d => x(d)).attr("x2", d => x(d))
        .attr("y1", 0).attr("y2", ph)
        .attr("stroke", COLORS.grid).attr("stroke-width", 0.5);

      g.selectAll(".grid-y").data(yTicks).enter().append("line")
        .attr("data-grid", "y")
        .attr("x1", 0).attr("x2", pw)
        .attr("y1", d => y(d)).attr("y2", d => y(d))
        .attr("stroke", COLORS.grid).attr("stroke-width", 0.5);

      // Frame
      g.append("rect")
        .attr("data-layer", "frame")
        .attr("width", pw).attr("height", ph)
        .attr("fill", "none")
        .attr("stroke", COLORS.frame).attr("stroke-width", 0.8);

      // SE-PASS threshold line
      g.append("line")
        .attr("data-layer", "threshold")
        .attr("x1", 0).attr("x2", pw)
        .attr("y1", y(11)).attr("y2", y(11))
        .attr("stroke", COLORS.threshold)
        .attr("stroke-width", 0.9)
        .attr("stroke-dasharray", "5,3");

      g.append("text")
        .attr("data-label", "threshold")
        .attr("x", pw * 0.78).attr("y", y(11) - 4)
        .attr("text-anchor", "middle")
        .attr("font-size", "10px").attr("fill", COLORS.threshold)
        .attr("font-style", "italic")
        .text("SE-PASS threshold");

      // Points: other tasks
      const others = data.filter(d => d.cat === "other");
      g.selectAll(".pt-other").data(others).enter().append("circle")
        .attr("data-series", "other")
        .attr("data-point-id", d => d.task)
        .attr("cx", d => x(d.files)).attr("cy", d => y(d.score))
        .attr("r", 4)
        .attr("fill", COLORS.other)
        .attr("fill-opacity", 0.7)
        .attr("stroke", "#8A876F")
        .attr("stroke-width", 0.5);

      // Points: kubernetes
      const kubes = data.filter(d => d.cat === "kube");
      const sqSize = 7;
      g.selectAll(".pt-kube").data(kubes).enter().append("rect")
        .attr("data-series", "kube")
        .attr("data-point-id", d => d.task)
        .attr("x", d => x(d.files) - sqSize/2)
        .attr("y", d => y(d.score) - sqSize/2)
        .attr("width", sqSize).attr("height", sqSize)
        .attr("fill", COLORS.kube)
        .attr("fill-opacity", 0.85)
        .attr("stroke", "#946260")
        .attr("stroke-width", 0.6);

      // Points: T10
      const t10 = data.filter(d => d.cat === "t10");
      const triSize = 75;
      const triangle = d3.symbol().type(d3.symbolTriangle).size(triSize);
      g.selectAll(".pt-t10").data(t10).enter().append("path")
        .attr("data-series", "t10")
        .attr("data-point-id", "T10")
        .attr("d", triangle)
        .attr("transform", d => `translate(${x(d.files)},${y(d.score)})`)
        .attr("fill", COLORS.t10)
        .attr("fill-opacity", 0.9)
        .attr("stroke", "#5E7F96")
        .attr("stroke-width", 0.6);

      // Annotations
      const annotations = [
        { task: "T10", dx: 8, dy: -3, anchor: "start" },
        { task: "K1", dx: 6, dy: -5, anchor: "start" },
        { task: "K2", dx: 8, dy: -5, anchor: "start" },
        { task: "K3", dx: -6, dy: 6, anchor: "end" },
        { task: "K4", dx: 6, dy: -5, anchor: "start" }
      ];
      annotations.forEach(a => {
        const d = data.find(dd => dd.task === a.task);
        if (!d) return;
        g.append("text")
          .attr("data-label", a.task)
          .attr("x", x(d.files) + a.dx)
          .attr("y", y(d.score) + a.dy)
          .attr("text-anchor", a.anchor)
          .attr("font-size", "9.5px")
          .attr("fill", d.cat === "kube" ? "#8A5755" : d.cat === "t10" ? "#5E7F96" : COLORS.axis)
          .attr("font-weight", 600)
          .text(a.task);
      });

      // X axis
      const xAxis = d3.axisBottom(x)
        .tickValues([1, 10, 100, 1000])
        .tickFormat(d3.format("d"))
        .tickSize(4);
      g.append("g")
        .attr("data-layer", "x-axis")
        .attr("transform", `translate(0,${ph})`)
        .call(xAxis)
        .call(g => g.select(".domain").attr("stroke", COLORS.frame).attr("stroke-width", 0.8))
        .call(g => g.selectAll(".tick line").attr("stroke", COLORS.axis))
        .call(g => g.selectAll(".tick text").attr("fill", COLORS.axis).attr("font-size", "10px"));

      g.append("text")
        .attr("data-label", "x-title")
        .attr("x", pw / 2).attr("y", ph + 36)
        .attr("text-anchor", "middle")
        .attr("font-size", "11.5px").attr("fill", COLORS.axis)
        .text("Ground-truth files (log scale)");

      // Y axis
      const yAxis = d3.axisLeft(y)
        .tickValues([0, 2, 4, 6, 8, 10, 12])
        .tickSize(4);
      g.append("g")
        .attr("data-layer", "y-axis")
        .call(yAxis)
        .call(g => g.select(".domain").attr("stroke", COLORS.frame).attr("stroke-width", 0.8))
        .call(g => g.selectAll(".tick line").attr("stroke", COLORS.axis))
        .call(g => g.selectAll(".tick text").attr("fill", COLORS.axis).attr("font-size", "10px"));

      g.append("text")
        .attr("data-label", "y-title")
        .attr("transform", "rotate(-90)")
        .attr("x", -ph / 2).attr("y", -38)
        .attr("text-anchor", "middle")
        .attr("font-size", "11.5px").attr("fill", COLORS.axis)
        .text("Mean composite score");

      // Legend (lower-right, sparse data region)
      const legendX = pw - 158, legendY = ph - 72;
      const lg = g.append("g").attr("data-layer", "legend")
        .attr("transform", `translate(${legendX},${legendY})`);

      lg.append("rect")
        .attr("x", -5).attr("y", -5)
        .attr("width", 156).attr("height", 60)
        .attr("rx", 2)
        .attr("fill", COLORS.legendBg)
        .attr("stroke", "#D5D3CC").attr("stroke-width", 0.5);

      // Legend: other
      lg.append("circle")
        .attr("cx", 7).attr("cy", 8).attr("r", 4)
        .attr("fill", COLORS.other).attr("fill-opacity", 0.7)
        .attr("stroke", "#8A876F").attr("stroke-width", 0.5);
      lg.append("text").attr("x", 16).attr("y", 12)
        .attr("font-size", "9px").attr("fill", COLORS.axis)
        .attr("data-legend-item", "other")
        .text("Other tasks");

      // Legend: kube
      lg.append("rect")
        .attr("x", 3).attr("y", 21).attr("width", 8).attr("height", 8)
        .attr("fill", COLORS.kube).attr("fill-opacity", 0.85)
        .attr("stroke", "#946260").attr("stroke-width", 0.6);
      lg.append("text").attr("x", 16).attr("y", 30)
        .attr("font-size", "9px").attr("fill", COLORS.axis)
        .attr("data-legend-item", "kube")
        .text("Kubernetes (0/32 SE-PASS)");

      // Legend: t10
      lg.append("path")
        .attr("d", d3.symbol().type(d3.symbolTriangle).size(55)())
        .attr("transform", "translate(7,43)")
        .attr("fill", COLORS.t10).attr("fill-opacity", 0.9)
        .attr("stroke", "#5E7F96").attr("stroke-width", 0.6);
      lg.append("text").attr("x", 16).attr("y", 47)
        .attr("font-size", "9px").attr("fill", COLORS.axis)
        .attr("data-legend-item", "t10")
        .text("T10 (only SE-PASS)");

    }).catch(err => {
      document.body.innerHTML = `<pre style="color:red">Error: ${err}\nServe with: python -m http.server 8080</pre>`;
    });
  </script>
</body>
</html>
